<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <title>Consult Data</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        form {
            max-width: 400px;
            margin: auto;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
        }

        .form-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        .form-group button {
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        .form-group button:hover {
            background-color: #0056b3;
        }

        .response {
            margin-top: 20px;
            border: 1px solid #ddd;
            padding: 15px;
            background-color: #f9f9f9;
        }

        .tooltip {
            position: relative;
            display: inline-block;
            border-bottom: 1px dotted black;
        }

        .tooltip .tooltiptext {
            visibility: hidden;
            width: 120px;
            background-color: rgb(239, 239, 239);
            color: #1e1d1d;
            text-align: left;
            border-radius: 6px;
            padding: 7px 14px;

            /* Position the tooltip */
            position: absolute;
            z-index: 1;
            top: 100%;
            left: 50%;
            margin-left: -60px;
        }

        .tooltip:hover .tooltiptext {
            visibility: visible;
        }
        .miniLogo{
            border-radius: 100%;
            width: 1rem;
            height: 1rem;
            padding: 9px 0;
        }
        .form-select {
            width: 100%;
            padding: 0.375rem 2.25rem 0.375rem 0.75rem;
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.5;
            color: #212529;
            background-color: #fff;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23343a40' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M2 5l6 6 6-6'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 16px 12px;
            border: 1px solid #ced4da;
            border-radius: 0.25rem;
            appearance: none;
        }
        form {
            max-width: 300px;
            margin: 20px auto;
        }
        button {
            margin-top: 10px;
            padding: 5px 10px;
        }
    </style>
</head>

<body>
    <h1>Consult Data</h1>
    <form id="consult-data-form">
        <div class="form-group">
            <label for="contractAdd">Contract Address</label>
            <input type="text" id="contractAdd" name="contractAdd"
                placeholder="0x000000000000000000000000000000000000000" required>
        </div>
        <div class="form-group">
            <label for="publicMethod">Information to consult</label>
            <select id="publicMethod" name="publicMethod" class="form-select" required>
                <option value="" disabled selected hidden>Select a method</option>
                <option value="name">name</option>
                <option value="fLastName">fLastName</option>
                <option value="mLastName">mLastName</option>
                <option value="gender">gender</option>
                <option value="day">day</option>
                <option value="month">month</option>
                <option value="year">year</option>
                <option value="state">state</option>
                <option value="municipality">municipality</option>
                <option value="dateCreation">dateCreation</option>
                <option value="dateLastUpdate">dateLastUpdate</option>
                <option value="tokenFather">token Father</option>
                <option value="tokenMother">token Mother</option>
                <option value="tokenDigIdentity">token Digldentity</option>
                <option value="government">government</option>
            </select>
            <!-- <input type="text" id="publicMethod" name="publicMethod" placeholder="fLastName" required> -->
            <!-- <div class="tooltip"><img src="/images/moreInfo.png" alt="moreInfo" class="miniLogo"> -->
                <!-- <span class="tooltiptext">
                    name
                    fLastName
                    mLastName
                    gender
                    day
                    month
                    year
                    state
                    municipality
                    dateCreation
                    dateLastUpdate
                    token Father
                    token Mother
                    token Digldentity
                    government
                </span>
              </div> -->
        </div>
        <div class="form-group">
            <button type="submit">Submit</button>
        </div>
    </form>

    <div class="response" id="response-container">
        <!-- Response will be displayed here -->
    </div>

    <script>
        document.getElementById('consult-data-form').addEventListener('submit', async (event) => {
            event.preventDefault();

            const formData = new FormData(event.target);
            const data = Object.fromEntries(formData.entries());

            try {
                // Fetching data from your backend endpoint using GET request with query parameters
                const response = await fetch(`/consult-data?contractAdd=${encodeURIComponent(data.contractAdd)}&publicMethod=${encodeURIComponent(data.publicMethod)}`, {
                    method: 'GET'
                });

                const result = await response.json();
                document.getElementById('response-container').innerHTML = `
                    <h3>Response</h3>
                    <pre>${JSON.stringify(result, null, 2)}</pre>
                `;
            } catch (error) {
                document.getElementById('response-container').innerHTML = `
                    <h3>Error</h3>
                    <pre>${error.message}</pre>
                `;
            }
        });
    </script>
</body>

</html>
